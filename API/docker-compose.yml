services:
  postgres:
    image: postgres:18
    container_name: lamp_factory_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  auth_service:
    build:
      context: ./auth_service
      dockerfile: Dockerfile
    container_name: auth_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVICE_PORT: 8004
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./auth_service:/app

  product_service:
    build:
      context: ./product_service
      dockerfile: Dockerfile
    container_name: product_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVICE_PORT: 8001
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      auth_service:
        condition: service_started
    volumes:
      - ./product_service:/app

  order_service:
    build:
      context: ./order_service
      dockerfile: Dockerfile
    container_name: order_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVICE_PORT: 8002
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      auth_service:
        condition: service_started
    volumes:
      - ./order_service:/app

  admin_service:
    build:
      context: ./admin_service
      dockerfile: Dockerfile
    container_name: admin_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVICE_PORT: 8003
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      auth_service:
        condition: service_started
    volumes:
      - ./admin_service:/app
  
  api_gateway:
    build:
      context: ./api_gateway
      dockerfile: Dockerfile
    container_name: api_gateway
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVICE_PORT: 8000
      AUTH_SERVICE_URL: http://auth_service:8004
      PRODUCT_SERVICE_URL: http://product_service:8001
      ORDER_SERVICE_URL: http://order_service:8002
      ADMIN_SERVICE_URL: http://admin_service:8003
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    ports:
      - "8000:8000"
    depends_on:
      auth_service:
        condition: service_started
      product_service:
        condition: service_started
      order_service:
        condition: service_started
      admin_service:
        condition: service_started
    volumes:
      - ./api_gateway:/app

volumes:
  postgres_data: